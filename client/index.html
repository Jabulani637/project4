<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>User Name Form</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="card">
    <h1>Enter your name</h1>

    <form id="nameForm" autocomplete="on">
      <label for="name">Name</label>
      <input
        id="name"
        name="name"
        type="text"
        placeholder="..."
        required
      />

      <button type="submit">Submit</button>
    </form>

    <div id="result" class="result" aria-live="polite"></div>
  </div>

  <script>
    const form = document.getElementById('nameForm');
    const nameInput = document.getElementById('name');
    const result = document.getElementById('result');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = nameInput.value.trim();

      result.textContent = '';

      try {
        const resp = await fetch('http://localhost:3000/api/name', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name })
        });

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          result.textContent = err.error || 'Failed to submit name.';
          return;
        }

        const data = await resp.json();
        result.textContent = data.message || '';
      } catch {
        result.textContent = 'Could not reach backend. Is the server running?';
      }
    });
  </script>
</body>
</html>
